<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Trainer Lab</title>
    <script type="module" crossorigin src="/SnakeAI/assets/index-BpF9Tvd3.js"></script>
    <link rel="stylesheet" crossorigin href="/SnakeAI/assets/index-B7BifPxP.css">
  </head>
  <body>
    <main id="app">
      <canvas id="netCanvas" aria-label="Left visualization"></canvas>
      <canvas id="gameCanvas" aria-label="Snake board"></canvas>
      <section class="panel">
        <h1>Snake Trainer Lab</h1>
        <div id="stats" class="stats">Training...</div>
        <div class="controls-panel">
          <div class="control-section inline-control">
            <label class="control-label" for="algorithmSelect">Algorithm</label>
            <select id="algorithmSelect">
              <optgroup label="Black-Box">
                <option value="ga">GA</option>
                <option value="es">ES</option>
                <option value="pso">PSO</option>
                <option value="cmaes">CMA-ES</option>
                <option value="openai-es">OpenAI-ES</option>
              </optgroup>
              <optgroup label="Policy Gradient">
                <option value="reinforce">REINFORCE</option>
                <option value="a2c">A2C</option>
                <option value="ppo">PPO</option>
              </optgroup>
            </select>
          </div>
          <div class="control-section inline-control">
            <label class="control-label" for="architectureSelect">Network</label>
            <select id="architectureSelect">
              <option value="mlp" selected>MLP</option>
              <option value="transformer">Transformer</option>
            </select>
          </div>
          <div class="control-section toggle-row">
            <input id="turboToggle" type="checkbox" />
            <label for="turboToggle">Turbo (max speed)</label>
          </div>
          <div class="control-section toggle-row">
            <input id="leftViewToggle" type="checkbox" />
            <label for="leftViewToggle">Visualise all snakes</label>
          </div>
          <div class="control-section hidden-controls">
            <span class="control-label">Grid size</span>
            <div class="hidden-buttons">
              <button
                id="gridDown"
                type="button"
                aria-label="Decrease grid size"
              >
                -
              </button>
              <span id="gridValue">10x10</span>
              <button id="gridUp" type="button" aria-label="Increase grid size">
                +
              </button>
              <button
                id="resetTraining"
                type="button"
                aria-label="Reset training"
              >
                Reset
              </button>
            </div>
          </div>
        </div>
        <canvas id="chartCanvas" aria-label="Training history"></canvas>
      </section>
    </main>
  </body>
</html>
